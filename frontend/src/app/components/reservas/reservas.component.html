<div class="animate-fade-in-up">
  <h1 class="text-3xl font-heading font-bold mb-8">Tus Reservas</h1>

  <div *ngIf="reservas.length === 0" class="alert bg-base-200 shadow-lg">
    <svg xmlns="http://www.w3.org/2000/svg" class="stroke-info shrink-0 w-6 h-6" fill="none" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
    <span>No tienes reservas activas.</span>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let reserva of reservas" class="card bg-base-200 shadow-xl border border-base-300 hover:shadow-2xl transition-all duration-300">
      <div class="card-body">
        <h2 class="card-title gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>
          Reserva #{{ reserva.id }}
        </h2>
        <div class="space-y-2 mt-2">
          <div class="flex justify-between">
            <span class="text-sm opacity-70">Cuarto:</span>
            <span class="badge badge-outline">{{ reserva.cuarto_id }}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-sm opacity-70">Tipo:</span>
            <span class="badge badge-primary badge-outline">{{ reserva.tiporeserva_id }}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-sm opacity-70">Desde:</span>
            <span class="text-sm font-medium">{{ reserva.inicio }}</span>
          </div>
          <div class="flex justify-between">
            <span class="text-sm opacity-70">Hasta:</span>
            <span class="text-sm font-medium">{{ reserva.fin }}</span>
          </div>
        </div>
        <div class="card-actions justify-end mt-4">
          <button class="btn btn-error btn-sm btn-outline gap-1" (click)="borrarReserva(reserva.id)">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            Cancelar
          </button>
        </div>
      </div>
    </div>
  </div>
</div>
