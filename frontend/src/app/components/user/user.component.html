<div class="animate-fade-in-up">
  <div class="card bg-base-200 shadow-xl max-w-2xl mx-auto">
    <div class="card-body">
      <div class="flex items-center gap-4 mb-6">
        <div class="avatar placeholder">
          <div class="bg-primary text-primary-content rounded-full w-16">
            <span class="text-2xl">{{ nombre?.charAt(0)?.toUpperCase() }}</span>
          </div>
        </div>
        <div>
          <h2 class="card-title text-2xl font-heading">Mi Perfil</h2>
          <div class="badge badge-primary badge-outline mt-1">{{ rol }}</div>
        </div>
      </div>

      <div class="space-y-4">
        <div class="form-control">
          <label class="label"><span class="label-text font-semibold">Correo Electrónico</span></label>
          <input type="text" class="input input-bordered w-full" [value]="correo" disabled />
        </div>

        <div class="form-control">
          <label class="label"><span class="label-text font-semibold">Nombre</span></label>
          <p *ngIf="!editando" class="input input-bordered w-full flex items-center bg-base-300">{{ nombre }}</p>
          <input *ngIf="editando" [(ngModel)]="nuevoNombre" type="text" placeholder="Nuevo nombre" class="input input-bordered w-full" />
        </div>
      </div>

      <div *ngIf="rol == 'propietario'" class="mt-4">
        <a routerLink="/propietario" class="btn btn-outline btn-secondary btn-sm gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          Mis pensiones
        </a>
      </div>

      <div class="divider"></div>

      <div class="flex flex-wrap gap-2 justify-end">
        <button *ngIf="!editando" (click)="editar()" class="btn btn-primary btn-sm gap-2">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
          Editar
        </button>
        <button *ngIf="editando" (click)="guardar()" class="btn btn-success btn-sm">Guardar</button>
        <button *ngIf="editando" (click)="cancelar()" class="btn btn-ghost btn-sm">Cancelar</button>
        <button (click)="eliminar()" type="button" class="btn btn-error btn-outline btn-sm">Eliminar Cuenta</button>
        <button (click)="logout()" type="button" class="btn btn-ghost btn-sm">Cerrar Sesión</button>
      </div>
    </div>
  </div>
</div>
