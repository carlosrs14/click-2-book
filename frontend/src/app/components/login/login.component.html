<div class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="card w-full max-w-md bg-base-100 shadow-2xl">
    <div class="card-body">
      <div class="text-center mb-6">
        <a routerLink="/home" class="inline-flex items-center justify-center gap-2 mb-4 hover:scale-105 transition-transform">
          <div class="bg-primary text-primary-content p-3 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>
          </div>
          <h1 class="text-3xl font-bold text-primary font-heading">Click2Book</h1>
        </a>
        <p class="text-base-content/70">Gestiona tus reservas de pensiones y apartamentos</p>
      </div>

      <form (ngSubmit)="login()" class="space-y-4">
        <div class="form-control w-full">
          <label class="label"><span class="label-text">Correo Electrónico</span></label>
          <input type="email" name="email" [(ngModel)]="email" placeholder="tu@email.com" class="input input-bordered w-full" required />
        </div>
        <div class="form-control w-full">
          <label class="label"><span class="label-text">Contraseña</span></label>
          <input type="password" name="password" [(ngModel)]="password" placeholder="••••••••" class="input input-bordered w-full" required />
        </div>
        <div class="form-control mt-6">
          <button type="submit" class="btn btn-primary w-full">Iniciar sesión</button>
        </div>
      </form>

      <div class="divider my-6">O</div>

      <button class="btn btn-outline w-full gap-2 mb-4">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-google" viewBox="0 0 16 16"><path d="M15.545 6.558a9.42 9.42 0 0 1 .139 1.626c0 2.434-.87 4.492-2.384 5.885h.002C11.978 15.292 10.158 16 8 16A8 8 0 1 1 8 0a7.689 7.689 0 0 1 5.352 2.082l-2.284 2.284A4.347 4.347 0 0 0 8 3.166c-2.087 0-3.86 1.408-4.492 3.304a4.792 4.792 0 0 0 0 3.063h.003c.635 1.893 2.405 3.301 4.492 3.301 1.078 0 2.004-.276 2.722-.764h-.003a3.702 3.702 0 0 0 1.599-2.431H8v-3.08h7.545z"/></svg>
        Inicia con Google
      </button>

      <div class="text-center mt-4">
        <p class="text-sm">¿No tienes una cuenta? <a routerLink="/registro" class="link link-primary font-semibold">Regístrate ya</a></p>
      </div>
    </div>
  </div>
</div>
