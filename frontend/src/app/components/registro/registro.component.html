<div class="min-h-screen bg-base-200 flex items-center justify-center p-4">
  <div class="card w-full max-w-2xl bg-base-100 shadow-2xl my-8">
    <div class="card-body">
      <div class="text-center mb-6">
        <a routerLink="/home" class="inline-flex items-center justify-center gap-2 mb-4 hover:scale-105 transition-transform">
          <div class="bg-primary text-primary-content p-3 rounded-full">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="w-8 h-8"><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/><path d="M8 14h.01"/><path d="M12 14h.01"/><path d="M16 14h.01"/><path d="M8 18h.01"/><path d="M12 18h.01"/><path d="M16 18h.01"/></svg>
          </div>
          <h1 class="text-3xl font-bold text-primary font-heading">Click2Book</h1>
        </a>
        <h2 class="text-2xl font-bold mt-2">Crear una nueva cuenta</h2>
        <p class="text-base-content/70">Únete a nuestra plataforma para gestionar alojamientos</p>
      </div>

      <form (ngSubmit)="register()" class="space-y-4">
        
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-control w-full">
            <label class="label"><span class="label-text">Nombre</span></label>
            <input type="text" name="nombre" [(ngModel)]="nombre" placeholder="Nombre" class="input input-bordered w-full" required />
          </div>
          <div class="form-control w-full">
            <label class="label"><span class="label-text">Apellido</span></label>
            <input type="text" name="apellido" [(ngModel)]="apellido" placeholder="Apellido" class="input input-bordered w-full" required />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-control w-full">
            <label class="label"><span class="label-text">Fecha de nacimiento</span></label>
            <input [type]="fechaInputType" name="fechaNacimiento" [(ngModel)]="fechaNacimiento" placeholder="YYYY-MM-DD" (mouseenter)="cambiarTipo('date')" (mouseleave)="restaurarTipo()" class="input input-bordered w-full" required />
          </div>
          <div class="form-control w-full">
            <label class="label"><span class="label-text">Correo Electrónico</span></label>
            <input type="email" name="correo" [(ngModel)]="correo" placeholder="tu@email.com" class="input input-bordered w-full" required />
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <div class="form-control w-full">
            <label class="label"><span class="label-text">Contraseña</span></label>
            <input type="password" name="contrasena" [(ngModel)]="contrasena" placeholder="••••••••" class="input input-bordered w-full" required />
          </div>
          <div class="form-control w-full">
            <label class="label"><span class="label-text">Confirmar contraseña</span></label>
            <input type="password" name="confirmarContrasena" [(ngModel)]="confirmarContrasena" placeholder="••••••••" class="input input-bordered w-full" required />
          </div>
        </div>

        <div class="form-control w-full">
          <label class="label"><span class="label-text">Tipo de Cuenta</span></label>
          <select name="tipo" [(ngModel)]="rol" class="select select-bordered w-full">
            <option value="2">Estudiante</option>
            <option value="3">Arrendador</option>
            <option value="1">Administrador</option>
          </select>
        </div>

        <div class="form-control mt-6">
          <button type="submit" class="btn btn-primary w-full">Registrarse</button>
        </div>
      </form>

      <div class="text-center mt-6">
        <p class="text-sm">¿Ya tienes una cuenta? <a routerLink="/login" class="link link-primary font-semibold">Inicia Sesión</a></p>
      </div>

    </div>
  </div>
</div>
